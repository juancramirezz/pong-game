<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        /* Your styles here */
    </style>
</head>
<body>
    <canvas id="pongCanvas"></canvas>
    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;

        let ballSpeed = 2;
        let ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, dx: ballSpeed, dy: ballSpeed };
        let playerPaddle = { width: 10, height: 100, x: 0, y: canvas.height / 2 - 50 };
        let aiPaddle = { width: 10, height: 100, x: canvas.width - 10, y: canvas.height / 2 - 50 };  
        let playerScore = 0;
        let aiScore = 0;
        let gameStartTime;

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF';
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddles() {
            ctx.fillStyle = '#FFF';
            ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            ctx.fillRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height);
        }

        function calculateBounceAngle(paddleY) {
            const hitY = ball.y - paddleY;
            const normalizedHitY = hitY / (playerPaddle.height / 2);
            const bounceAngle = normalizedHitY * (Math.PI / 4); // Angle range from -45° to 45°
            return bounceAngle;
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {
                ball.dy *= -1;
            }

            if (ball.x - ball.radius <= playerPaddle.x + playerPaddle.width && 
                ball.y > playerPaddle.y && ball.y < playerPaddle.y + playerPaddle.height) {
                ball.dx *= -1;
                const bounceAngle = calculateBounceAngle(playerPaddle.y);
                ball.dy = ballSpeed * Math.sin(bounceAngle);
                ball.dx = ballSpeed * Math.cos(bounceAngle);
            }

            if (ball.x + ball.radius >= aiPaddle.x && 
                ball.y > aiPaddle.y && ball.y < aiPaddle.y + aiPaddle.height) {
                ball.dx *= -1;
                // Assuming AI calculates bounce angle similarly (implement AI logic here)
            }

            const elapsedTime = Math.floor((Date.now() - gameStartTime) / 1000); // in seconds
            if (elapsedTime > 0) {
                ballSpeed += elapsedTime * 0.01; // Increase speed over time
                ball.dx = (ball.dx > 0 ? 1 : -1) * ballSpeed; // Maintain direction
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddles();
            updateBall();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameStartTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        window.onload = () => {
            startGame();
        };
    </script>
</body>
</html>
